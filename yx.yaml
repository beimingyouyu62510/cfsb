# --------------------------------------------------
# Mihomo 稳定增强版（2026 优化版）
# --------------------------------------------------

# 1. 锚点（用于 proxy-providers）
p: &p
  type: http
  interval: 3600
  health-check:
    enable: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    timeout: 5000

# 2. 全局配置
mode: rule
ipv6: false
log-level: info
allow-lan: true
mixed-port: 7890
unified-delay: true
tcp-concurrent: true
sniff: true                     # 推荐开启，提升域名嗅探准确性

# 3. Geo 数据（推荐使用 MetaCubeX 源，更稳定）
geodata-mode: true
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"

# 4. Hosts 与 DNS（解决解析失败）
hosts:
  'raw.githubusercontent.com':
    - 185.199.108.133
    - 185.199.109.133
    - 185.199.110.133
    - 185.199.111.133

dns:
  enable: true
  listen: :1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
  # 可选增强（防止污染）
  respect-rules: true
  use-hosts: true

# 5. 订阅（保留你的原始订阅地址 + 加速前缀）
proxy-providers:
  我的订阅:
    <<: *p
    url: "https://ghfast.top/https://raw.githubusercontent.com/beimingyouyu62510/cfsb/refs/heads/main/nodes.yaml"
    path: ./proxy_provider/nodes.yaml

# 6. 策略组
proxy-groups:
  - name: 节点选择
    type: select
    use: [我的订阅]
    allow-empty: true
    proxies: [自动选择, 故障转移, DIRECT]

  - name: 自动选择
    type: url-test
    use: [我的订阅]
    allow-empty: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  - name: 故障转移
    type: fallback
    use: [我的订阅]
    allow-empty: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 全部节点
    type: select
    use: [我的订阅]
    allow-empty: true

  # 分流组
  - { name: 境外AI, type: select, proxies: [节点选择, 自动选择, DIRECT] }
  - { name: Telegram, type: select, proxies: [节点选择, 自动选择] }
  - { name: Google, type: select, proxies: [节点选择, 自动选择] }
  - { name: YouTube, type: select, proxies: [节点选择, 自动选择] }
  - { name: GitHub, type: select, proxies: [节点选择, 自动选择, DIRECT] }
  - { name: 微软服务, type: select, proxies: [DIRECT, 节点选择] }
  - { name: Apple 服务, type: select, proxies: [节点选择, DIRECT] }   # 新增独立组
  - { name: 广告拦截, type: select, proxies: [REJECT, DIRECT] }
  - { name: 国内流量, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 漏网之鱼, type: select, proxies: [节点选择, 自动选择, DIRECT] }

# 7. 规则集（使用镜像加速）
rule-providers:
  ads:
    type: http
    behavior: domain
    url: "https://ghfast.top/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.yaml"
    path: ./ruleset/ads.yaml
    interval: 86400

  cn:
    type: http
    behavior: domain
    url: "https://ghfast.top/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cn.yaml"
    path: ./ruleset/cn.yaml
    interval: 86400

# 8. 规则（优化后的顺序）
rules:
  # 广告拦截优先
  - RULE-SET,ads,广告拦截

  # 境外特定服务（优先匹配，避免被国内规则误伤）
  - GEOSITE,category-scholar-!cn,境外AI
  - GEOSITE,github,GitHub
  - GEOSITE,telegram,Telegram
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,Google
  - GEOSITE,microsoft,微软服务
  - GEOSITE,apple,Apple 服务           # 独立处理 Apple

  # 国内域名与 IP
  - RULE-SET,cn,国内流量
  - GEOIP,CN,国内流量

  # 最终兜底
  - MATCH,漏网之鱼

# 可选：自动更新 Geo 数据
geo-auto-update: true
geo-update-interval: 24
