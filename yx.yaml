# -------------------------------------------------------------------
# Mihomo (Clash Meta) 极客硬核配置 - 最终全自适应版
# 核心逻辑：内置Hosts硬解析 / CDN镜像加速 / 节点全自动展开
# -------------------------------------------------------------------

# 1. 锚点定义
pr: &pr { type: select, proxies: [节点选择, 自动选择, 全部节点, DIRECT] }
p: &p { type: http, interval: 3600, health-check: { enable: true, url: https://cp.cloudflare.com, interval: 300, timeout: 1000 } }

# 2. 基础全局配置
mode: rule
ipv6: true
log-level: info
allow-lan: true
mixed-port: 7890
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

# 3. DNS 与 Hosts 硬解析 (解决 DNS Resolve Failed 报错)
hosts:
  'raw.githubusercontent.com': [185.199.108.133, 185.199.109.133, 185.199.110.133, 185.199.111.133]
  'ghfast.top': [115.236.137.154]

dns:
  enable: true
  listen: :1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter: ['*', '+.lan', '+.local', '+.msftncsi.com']
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
  proxy-server-nameserver:
    - 'https://doh.pub/dns-query'
  nameserver-policy:
    "geosite:cn,private": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
    "geosite:!cn": ["https://dns.cloudflare.com/dns-query", "https://dns.google/dns-query"]

# 4. 远程订阅源 (已增加 CDN 加速前缀)
proxy-providers:
  我的订阅:
    <<: *p
    url: "https://ghfast.top/https://raw.githubusercontent.com/beimingyouyu62510/cfsb/refs/heads/main/nodes.yaml"
    path: ./proxy_provider/nodes.yaml

# 5. 策略组 (自适应任何节点名称)
proxy-groups:
  - { name: 节点选择, type: select, use: [我的订阅], proxies: [自动选择, 全部节点, DIRECT], allow-empty: true }
  
  - { name: 自动选择, type: url-test, use: [我的订阅], tolerance: 50, interval: 300, allow-empty: true }

  - { name: 全部节点, type: select, use: [我的订阅], allow-empty: true }

  - { name: 境外AI, <<: *pr }
  - { name: Telegram, <<: *pr }
  - { name: Google, <<: *pr }
  - { name: YouTube, <<: *pr }
  - { name: GitHub, <<: *pr }
  - { name: 微软服务, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 广告拦截, type: select, proxies: [REJECT, DIRECT] }
  - { name: 国内流量, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 漏网之鱼, <<: *pr }

# 6. 规则集 (已增加 CDN 加速前缀)
rule-providers:
  ads:
    type: http
    behavior: domain
    url: "https://ghfast.top/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./ruleset/ads.yaml
    interval: 86400

rules:
  - RULE-SET,ads,广告拦截
  - GEOSITE,category-scholar-!cn,境外AI
  - GEOSITE,github,GitHub
  - GEOSITE,telegram,Telegram
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,Google
  - GEOSITE,microsoft,微软服务
  - GEOSITE,apple,微软服务
  - GEOSITE,CN,国内流量
  - GEOIP,CN,国内流量
  - MATCH,漏网之鱼
