# mihomo (Clash Meta) 优化配置 - 极简节点显示版
# 重点优化：去除了地区分组，直接显示所有具体节点

# 延迟检测模板
p: &p
  type: http
  interval: 3600
  health-check:
    enable: true
    url: https://cp.cloudflare.com
    interval: 300
    timeout: 1000
    tolerance: 100

# 订阅源配置
proxy-providers:
  我的节点订阅:
    <<: *p
    # 这里替换为你托管在 GitHub 的 Raw 链接或机场链接
    url: "你的_GITHUB_RAW_链接_或者机场订阅链接"
    path: ./proxy_provider/my_nodes.yaml

# 基础设置
mode: rule
ipv6: true
log-level: info
allow-lan: true
mixed-port: 7890
unified-delay: true
tcp-concurrent: true
external-controller: :9090
geodata-mode: true

# DNS 设置 (针对大陆环境优化)
dns:
  enable: true
  listen: :1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  nameserver-policy:
    "geosite:cn,private": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
    "geosite:!cn,!private": ["tls://8.8.4.4", "tls://1.1.1.1"]

# 策略组优化 (去除了地区分类，直接显示节点)
proxy-groups:
  # 1. 主选择开关：直接显示所有节点名
  - {
      name: 节点选择,
      type: select,
      use: [https://raw.githubusercontent.com/beimingyouyu62510/cfsb/refs/heads/main/nodes.yaml],
      proxies: [自动选择, DIRECT],
    }

  # 2. 自动测速组：自动选出延迟最低的节点
  - {
      name: 自动选择,
      type: url-test,
      use: [https://raw.githubusercontent.com/beimingyouyu62510/cfsb/refs/heads/main/nodes.yaml],
      interval: 300,
      tolerance: 50,
    }

  # 3. 功能性分组 (全部直接关联到“节点选择”)
  - { name: 境外AI, type: select, proxies: [节点选择, 自动选择, DIRECT] }
  - { name: Telegram, type: select, proxies: [节点选择, 自动选择] }
  - { name: Google, type: select, proxies: [节点选择, 自动选择] }
  - { name: YouTube, type: select, proxies: [节点选择, 自动选择] }
  - { name: Github, type: select, proxies: [节点选择, 自动选择] }
  - { name: 微软服务, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 广告拦截, type: select, proxies: [REJECT, DIRECT] }
  
  # 4. 兜底分流
  - { name: 国内, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 其他, type: select, proxies: [节点选择, 自动选择] }

# 分流规则
rules:
  - GEOSITE,category-scholar-!cn,境外AI
  - GEOSITE,github,Github
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,Google
  - GEOSITE,telegram,Telegram
  - GEOSITE,microsoft,微软服务
  - GEOSITE,geolocation-!cn,其他
  - GEOSITE,CN,国内
  - GEOIP,CN,国内
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - MATCH,其他
