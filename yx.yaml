# -------------------------------------------------------------------
# Mihomo (Clash Meta) 深度修复版 - 2026 最终修正
# 修复重点：DNS硬解析、Provider引用逻辑、策略组兼容性
# -------------------------------------------------------------------

# 1. 锚点定义 (极客复用逻辑)
p: &p { type: http, interval: 3600, health-check: { enable: true, url: https://cp.cloudflare.com, interval: 300, timeout: 5000 } }

# 2. 基础全局配置
mode: rule
ipv6: true
log-level: info
allow-lan: true
mixed-port: 7890
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome

# 3. DNS 与 Hosts 强力硬解析 (防止 dns resolve failed)
hosts:
  'raw.githubusercontent.com': [185.199.108.133, 185.199.109.133, 185.199.110.133, 185.199.111.133]
  'ghfast.top': [115.236.137.154]

dns:
  enable: true
  listen: :1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'

# 4. 远程订阅源 (核心修改点)
proxy-providers:
  我的订阅:
    <<: *p
    # 使用 ghfast 镜像，并确保 URL 路径完全正确
    url: "https://ghfast.top/https://raw.githubusercontent.com/beimingyouyu62510/cfsb/refs/heads/main/nodes.yaml"
    path: ./proxy_provider/nodes.yaml

# 5. 策略组 (深度优化后的引用逻辑)
proxy-groups:
  # 总开关：核心是使用 use 引用 provider
  - name: 节点选择
    type: select
    use: 
      - 我的订阅
    proxies:
      - 自动选择
      - 全部节点
      - DIRECT

  - name: 自动选择
    type: url-test
    use: 
      - 我的订阅
    tolerance: 50
    interval: 300

  - name: 全部节点
    type: select
    use: 
      - 我的订阅

  # 各 App 分组：统一指回“节点选择”
  - { name: 境外AI, type: select, proxies: [节点选择, 自动选择, DIRECT] }
  - { name: Telegram, type: select, proxies: [节点选择, 自动选择] }
  - { name: Google, type: select, proxies: [节点选择, 自动选择] }
  - { name: YouTube, type: select, proxies: [节点选择, 自动选择] }
  - { name: GitHub, type: select, proxies: [节点选择, 自动选择, DIRECT] }
  - { name: 微软服务, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 广告拦截, type: select, proxies: [REJECT, DIRECT] }
  - { name: 国内流量, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 漏网之鱼, type: select, proxies: [节点选择, 自动选择, DIRECT] }

# 6. 规则集
rule-providers:
  ads:
    type: http
    behavior: domain
    url: "https://ghfast.top/https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./ruleset/ads.yaml
    interval: 86400

rules:
  - RULE-SET,ads,广告拦截
  - GEOSITE,category-scholar-!cn,境外AI
  - GEOSITE,github,GitHub
  - GEOSITE,telegram,Telegram
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,Google
  - GEOSITE,microsoft,微软服务
  - GEOSITE,apple,微软服务
  - GEOSITE,CN,国内流量
  - GEOIP,CN,国内流量
  - MATCH,漏网之鱼
