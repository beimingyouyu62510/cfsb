allow-lan: true
unified-delay: false
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
tfo: false # 修复尝试：关闭 TFO，排除中间设备兼容性导致的断线问题

tun:
  enable: false
  stack: system
  auto-route: false
  auto-detect-interface: false
  strict-route: false

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: redir-host
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - 8.8.8.8
    - 1.1.1.1
proxies:
  - name: "TS-git"
    type: vless
    server: xzus.cf01.dpdns.org
    port: 443
    uuid: aa6afb24-210c-4fdc-979e-58f71a6f779f
    tls: true
    servername: git01.jisucf.cloudns.biz
    network: ws
    ws-opts:
        path: /?ed=2560
        headers:
          Host: git01.jisucf.cloudns.biz
  - name: "TS-cf"
    type: vless
    server: 104.17.98.5
    port: 443
    uuid: 871f3020-6158-4829-88ed-81843bb956e1
    tls: true
    servername: ts02.3xxx.de5.net
    network: ws
    ws-opts:
      path: /
      headers:
        Host: ts02.3xxx.de5.net
  - name: "new-git"
    type: vless
    server: 104.17.98.5
    port: 443
    uuid: 5fbbf263-0518-446c-8ef2-13b2001aa69d
    tls: true
    servername: newgit.jisucf.cloudns.ch
    network: ws
    ws-opts:
      path: /
      headers:
        Host: newgit.jisucf.cloudns.ch
  - name: "new1-git"
    type: vless
    server: xzus.cf01.dpdns.org
    port: 443
    uuid: 5fbbf263-0518-446c-8ef2-13b2001aa69d
    tls: true
    servername: newgit.jisucf.cloudns.ch
    network: ws
    ws-opts:
      path: /
      headers:
        Host: newgit.jisucf.cloudns.ch
  - name: "myvl"
    type: vless
    server: xzus.cf01.dpdns.org
    port: 443
    uuid: 5b5e1ef4-7844-4911-b257-ba660c3a3df1
    tls: true
    servername: vl.yxip.de5.net
    network: ws
    ws-opts:
      path: /
      headers:
        Host: vl.yxip.de5.net
proxy-groups:
  - name: 🎮 PoE专线 # 新增：游戏专用组，用于手动选择最稳定节点，杜绝自动切换
    type: select
    proxies:
      - "new-git"
      - "new1-git"
      - "myvl"
      - "TS-git"
      - "TS-cf"
  - name: ♻️ 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 600 # 优化：测速间隔增加到 600s (10 分钟)，减少自动切换频率
    tolerance: 30
    proxies:
      - "new-git"
      - "new1-git"
      - "myvl"
      - "TS-git"
      - "TS-cf"
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
  - name: 🌐 智能兜底
    type: fallback
    lazy: true
    url: https://www.gstatic.com/generate_204
    timeout: 3000
    proxies:
      - ♻️ 自动选择
      - DIRECT
  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT
  - name: 📲 电报信息
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT
  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT
  - name: 🖧 GitHub
    type: select
    proxies:
      - 🚀 节点选择 
      - DIRECT
  - name: 🍎 苹果服务
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
  - name: 🛑 全球拦截
    type: select
    proxies:
      - REJECT
  - name: 🍃 应用净化
    type: select
    proxies:
      - REJECT
