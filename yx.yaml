# -------------------------------------------------------------------
# Mihomo (Clash Meta) 极客硬核配置 - 节点全自适应版
# 核心逻辑：锚点复用 / 订阅全量展开 / 异步分流规则
# -------------------------------------------------------------------

# 1. 锚点定义 (全局逻辑复用，修改此处全局生效)
# pr 定义了所有应用分组（如 YouTube/Google）可选的范围
pr: &pr { type: select, proxies: [节点选择, 自动选择, 全部节点, DIRECT] }
# p 定义了订阅更新和健康检查的标准
p: &p { type: http, interval: 3600, health-check: { enable: true, url: https://cp.cloudflare.com, interval: 300, timeout: 1000 } }

# 2. 基础全局配置
mode: rule
ipv6: true
log-level: info
allow-lan: true
mixed-port: 7890
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

# 3. DNS 嗅探与解析 (硬核 Fake-IP 模式)
sniffer:
  enable: true
  sniff:
    TLS: { ports: [443, 8443] }
    HTTP: { ports: [80, 8080-8880], override-destination: true }

dns:
  enable: true
  listen: :1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter: ['*', '+.lan', '+.local', '+.msftncsi.com']
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
  proxy-server-nameserver:
    - 'https://doh.pub/dns-query'
  nameserver-policy:
    "geosite:cn,private": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
    "geosite:!cn": ["https://dns.cloudflare.com/dns-query", "https://dns.google/dns-query"]

# 4. 远程订阅源 (填入你的 GitHub Raw 链接)
proxy-providers:
  我的订阅:
    <<: *p
    url: "https://raw.githubusercontent.com/beimingyouyu62510/cfsb/refs/heads/main/nodes.yaml"
    path: ./proxy_provider/nodes.yaml

# 5. 策略组 (核心改动：自适应任何节点名称)
proxy-groups:
  # 总开关：直接展示订阅里的所有具体节点
  - { name: 节点选择, type: select, use: [我的订阅], proxies: [自动选择, 全部节点, DIRECT] }
  
  # 自动测速：自动选出延迟最低的节点（自适应）
  - { name: 自动选择, type: url-test, use: [我的订阅], tolerance: 50, interval: 300 }

  # 全部节点：备用手动选择列表
  - { name: 全部节点, type: select, use: [我的订阅] }

  # 应用分流组 (使用锚点快速构建，逻辑全部指向“节点选择”)
  - { name: 境外AI, <<: *pr }
  - { name: Telegram, <<: *pr }
  - { name: Google, <<: *pr }
  - { name: YouTube, <<: *pr }
  - { name: GitHub, <<: *pr }
  - { name: 微软服务, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 广告拦截, type: select, proxies: [REJECT, DIRECT] }
  - { name: 国内流量, type: select, proxies: [DIRECT, 节点选择] }
  - { name: 漏网之鱼, <<: *pr }

# 6. 规则集 (Rule Providers - 异步加载)
rule-providers:
  ads:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt"
    path: ./ruleset/ads.yaml
    interval: 86400

rules:
  - RULE-SET,ads,广告拦截
  - GEOSITE,category-scholar-!cn,境外AI
  - GEOSITE,github,GitHub
  - GEOSITE,telegram,Telegram
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,Google
  - GEOSITE,microsoft,微软服务
  - GEOSITE,apple,微软服务
  - GEOSITE,CN,国内流量
  - GEOIP,CN,国内流量
  - MATCH,漏网之鱼
